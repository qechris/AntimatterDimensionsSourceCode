name: Build

env:
  FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    branches:
      - main

jobs:
  build:
    name: Build 🔧
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: "14"
          cache: "npm"
      - run: npm ci
      - run: npm run build:master
